# Volta EV — nginx vhost separat (nu interfereaza cu alte proiecte pe acelasi VPS)
# Domeniu: ocpp.volta.md | APP_ROOT: /var/www/evvolta
# Instalare automata: sudo bash deploy/vps-add-project.sh
# Port OCPP intern: 9010 (proxy din location /ocpp/)

upstream evvolta_php {
    server unix:/run/php/php8.3-fpm.sock;
}

map $http_upgrade $connection_upgrade {
    default upgrade;
    '' close;
}

server {
    listen 80;
    listen [::]:80;
    server_name ocpp.volta.md;

    root /var/www/evvolta/backoffice/dist;
    index index.html;

    client_max_body_size 20m;

    # Laravel — health
    location = /up {
        include /etc/nginx/snippets/evvolta-laravel-php.conf;
    }

    # Laravel — API, plati, backoffice
    location ~ ^/(api|payments|backoffice)(/|$) {
        include /etc/nginx/snippets/evvolta-laravel-php.conf;
    }

    # SSE live stream sesiune
    location ~ ^/api/sessions/[0-9]+/stream$ {
        include /etc/nginx/snippets/evvolta-laravel-php.conf;
        fastcgi_read_timeout 3600s;
    }

    # OCPP 1.6J WebSocket
    location ^~ /ocpp/ {
        proxy_pass http://127.0.0.1:9010/ocpp/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    # Backoffice SPA
    location / {
        try_files $uri $uri/ /index.html;
    }

    location ~ /\.(?!well-known).* {
        deny all;
    }
}
